<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0C1028"/>
      <stop offset="100%" stop-color="#40206B"/>
    </linearGradient>
    <linearGradient id="vStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8EE3FF"/>
      <stop offset="100%" stop-color="#7B8CFF"/>
    </linearGradient>
    <linearGradient id="pipe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#33E1D4"/>
      <stop offset="100%" stop-color="#67A8FF"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="32" y="32" width="960" height="960" rx="220" fill="url(#bg)"/>

  <path
    d="M290 300 L468 710 L513 710 L734 300"
    fill="none"
    stroke="url(#vStroke)"
    stroke-width="70"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
  />

  <g fill="none" stroke="url(#pipe)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round">
    <path d="M250 770 L380 770 L440 710 L560 710 L620 650 L760 650" opacity="0.9"/>
  </g>

  <g fill="url(#pipe)">
    <circle cx="250" cy="770" r="24"/>
    <circle cx="380" cy="770" r="20"/>
    <circle cx="440" cy="710" r="20"/>
    <circle cx="560" cy="710" r="20"/>
    <circle cx="620" cy="650" r="20"/>
    <circle cx="760" cy="650" r="24"/>
  </g>
</svg>
